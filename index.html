<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>capital.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:#f5f6fa;color:#1a1d2e}
    button,input,select{font-family:inherit}
    button{cursor:pointer}
    .app{display:flex;min-height:100vh;position:relative}
    .sidebar{width:240px;background:#fff;border-right:1.5px solid #ececf4;padding:28px 16px;display:flex;flex-direction:column;gap:18px;position:sticky;top:0;height:100vh;transition:width .25s ease,padding .25s ease,transform .25s ease,opacity .2s ease;overflow:hidden}
    .sidebar.collapsed{width:0;padding:28px 0;border-right:none;opacity:0;pointer-events:none}
    .sidebar-collapse{position:fixed;left:224px;top:50%;transform:translateY(-50%);width:28px;height:56px;border:1.5px solid #ececf4;border-left:none;border-radius:0 14px 14px 0;background:#fff;display:flex;align-items:center;justify-content:center;color:#6366f1;font-size:16px;font-weight:800;z-index:20;box-shadow:0 8px 24px rgba(15,23,42,.06);transition:left .25s ease,transform .2s ease}
    .sidebar-collapse:hover{transform:translateY(-50%) scale(1.03)}
    .sidebar-collapsed .sidebar-collapse{left:0;border-left:1.5px solid #ececf4;border-radius:0 14px 14px 0}
    .sidebar-collapsed .main{padding-left:40px}
    .brand{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.5px}
    .brand span{color:#6366f1}
    .menu-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;padding:12px 14px;border:1.5px solid #ececf4;background:#f8f8fc;border-radius:14px;font-size:14px;font-weight:700;color:#1a1d2e}
    .menu-toggle .left{display:flex;align-items:center;gap:10px}
    .chev{transition:transform .2s ease}
    .chev.open{transform:rotate(180deg)}
    .menu{display:flex;flex-direction:column;gap:6px;overflow:hidden;max-height:260px;transition:max-height .25s ease, opacity .2s ease, margin .2s ease;opacity:1;margin-top:2px}
    .menu.closed{max-height:0;opacity:0;margin-top:0}
    .tab-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;border:none;border-radius:12px;background:transparent;color:#6b7280;font-size:14px;font-weight:600;text-align:left;transition:.15s}
    .tab-btn.active{background:#f0f0fb;color:#6366f1}
    .side-card{margin-top:auto;background:#f8f8fc;border:1.5px solid #ececf4;border-radius:16px;padding:16px}
    .side-card .k{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
    .side-card .v{font-size:24px;font-weight:800;font-family:'Syne',sans-serif}
    .side-card .sub{font-size:11px;font-weight:700;margin-top:4px}
    .sub.ok{color:#10b981}.sub.bad{color:#ef4444}
    .main{flex:1;padding:32px 28px;overflow:auto}
    .title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:24px}
    .cards-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
    .cards-2{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;margin-bottom:18px}
    .content-grid{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start}
    .assets-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
    .card{background:#fff;border:1.5px solid #ececf4;border-radius:20px;padding:20px}
    .stat-label{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
    .stat-val{font-size:24px;font-weight:800;font-family:'Syne',sans-serif}
    .stat-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
    .head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .section-title{font-size:15px;font-weight:800;margin-bottom:14px}
    .muted{color:#9ca3af}
    .small{font-size:12px}
    .field{width:100%;background:#f5f6fa;border:1.5px solid #ececf4;border-radius:12px;padding:10px 14px;font-size:14px;color:#1a1d2e;outline:none;transition:.15s}
    .field:focus{background:#fff;border-color:#6366f1}
    .btn{border:none;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:700}
    .btn-indigo{background:#6366f1;color:#fff}
    .btn-ghost{background:#f5f6fa;border:1.5px solid #ececf4;color:#6b7280}
    .seg{display:flex;background:#f5f6fa;border-radius:12px;padding:4px;gap:4px;margin-bottom:16px}
    .seg-btn{flex:1;border:none;border-radius:9px;padding:8px 0;background:transparent;color:#9ca3af;font-size:13px;font-weight:700}
    .seg-btn.active{background:#fff;color:#1a1d2e;box-shadow:0 1px 6px rgba(0,0,0,.07)}
    .form-stack{display:flex;flex-direction:column;gap:12px}
    .label{display:block;font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
    .row-hover{display:flex;align-items:center;justify-content:space-between;padding:10px 8px;border-radius:10px;border-bottom:1px solid #f5f5f8}
    .row-hover:hover{background:#f8f8fc}
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700}
    .empty{padding:26px;text-align:center;color:#c4c9d8;font-size:13px}
    .calendar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
    .cal-head{font-size:10px;font-weight:700;color:#c4c9d8;padding-bottom:4px}
    .cal-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;height:36px;font-size:13px;font-weight:600;transition:.12s}
    .cal-cell:hover{background:#f0f0f9}
    .dot{width:5px;height:5px;border-radius:50%;margin-top:2px}
    .pie-wrap{display:flex;align-items:center;gap:14px}
    .legend{display:flex;flex-direction:column;gap:6px;flex:1}
    .legend-row{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px}
    .legend-left{display:flex;align-items:center;gap:8px;min-width:0}
    .sw{width:10px;height:10px;border-radius:999px;flex-shrink:0}
    .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wallet{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#f8f8fc;border-radius:14px;border:1.5px solid #ececf4}
    .wallet-left{display:flex;align-items:center;gap:14px}
    .wallet-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .wallet-actions{display:flex;align-items:center;gap:10px}
    .delete-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid #ececf4;background:#fff;color:#d1d5db}
    .bar{height:6px;background:#f0f0f5;border-radius:6px;overflow:hidden}
    .bar > div{height:100%;border-radius:6px}
    .hide{display:none}
    @media (max-width: 1100px){
      .cards-3,.cards-2,.content-grid,.assets-grid{grid-template-columns:1fr}
      .sidebar{width:210px}
    }
    @media (max-width: 780px){
      .app{flex-direction:column}
      .sidebar{position:relative;width:100%;height:auto;border-right:none;border-bottom:1.5px solid #ececf4}
      .sidebar.collapsed{width:100%;height:0;padding:0;opacity:0}
      .sidebar-collapse{position:fixed;left:auto;right:12px;top:12px;transform:none;width:40px;height:40px;border:1.5px solid #ececf4;border-radius:12px}
      .sidebar-collapse:hover{transform:scale(1.03)}
      .sidebar-collapsed .sidebar-collapse{left:auto;right:12px;border-radius:12px}
      .main{padding:22px 16px}
    }
  </style>
</head>
<body>
  <div class="app">
    <button id="sidebarCollapse" class="sidebar-collapse" aria-label="Cerrar menú lateral">◀</button>
    <aside id="sidebar" class="sidebar">
      <div class="brand">capital<span>.</span></div>

      <div>
        <button id="menuToggle" class="menu-toggle">
          <span class="left"><span>☰</span><span>Menú</span></span>
          <span id="chev" class="chev open">▼</span>
        </button>
        <nav id="menu" class="menu"></nav>
      </div>

      <div class="side-card">
        <div class="k">Capital total</div>
        <div id="capitalTotal" class="v">$0,00</div>
        <div id="capitalNeto" class="sub ok">↑ $0,00 neto</div>
      </div>
    </aside>

    <main class="main">
      <section id="tab-resumen" class="tab-panel"></section>
      <section id="tab-movimientos" class="tab-panel hide"></section>
      <section id="tab-activos" class="tab-panel hide"></section>
    </main>
  </div>

<script>
const CATS_GASTO = ["Alimentación","Transporte","Vivienda","Salud","Entretenimiento","Ropa","Educación","Servicios","Otros"];
const CATS_INGRESO = ["Salario","Freelance","Inversiones","Alquiler","Regalo","Bono","Otros"];
const PALETTE = ["#6366f1","#f59e0b","#10b981","#ef4444","#3b82f6","#ec4899","#8b5cf6","#14b8a6","#f97316"];
const TABS = [
  {id:"resumen",label:"Resumen",icon:"◈"},
  {id:"movimientos",label:"Movimientos",icon:"↕"},
  {id:"activos",label:"Activos",icon:"◇"}
];
const INIT_WALLETS = [
  {id:1,nombre:"Efectivo",tipo:"físico",saldo:0,moneda:"ARS"},
  {id:2,nombre:"Mercado Pago",tipo:"virtual",saldo:0,moneda:"ARS"},
  {id:3,nombre:"Ualá",tipo:"virtual",saldo:0,moneda:"ARS"}
];

const state = {
  tab: 'resumen',
  menuOpen: true,
  sidebarOpen: true,
  calDate: todayStr(),
  formTipo: 'gasto',
  txns: load('ct_txns', []),
  wallets: load('ct_wallets', INIT_WALLETS)
};

function load(key, fallback){
  try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; }
}
function save(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
function fmt(n){ return `$${Number(n || 0).toLocaleString('es-AR',{minimumFractionDigits:2, maximumFractionDigits:2})}`; }
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function esc(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function groupByCat(tipo){
  const m = {};
  state.txns.filter(t => t.tipo === tipo).forEach(t => m[t.categoria] = (m[t.categoria] || 0) + Number(t.monto));
  return Object.entries(m).sort((a,b) => b[1]-a[1]);
}
function totals(){
  const totalActivos = state.wallets.reduce((a,w)=>a+Number(w.saldo||0),0);
  const totalIng = state.txns.filter(t=>t.tipo==='ingreso').reduce((a,t)=>a+Number(t.monto),0);
  const totalGasto = state.txns.filter(t=>t.tipo==='gasto').reduce((a,t)=>a+Number(t.monto),0);
  return { totalActivos, totalIng, totalGasto, balance: totalIng - totalGasto };
}
function txnsByDateMap(){
  const m={};
  state.txns.forEach(t => m[t.fecha] = (m[t.fecha] || 0) + (t.tipo === 'ingreso' ? Number(t.monto) : -Number(t.monto)));
  return m;
}
function renderMenu(){
  const menu = document.getElementById('menu');
  const chev = document.getElementById('chev');
  menu.className = 'menu' + (state.menuOpen ? '' : ' closed');
  chev.className = 'chev' + (state.menuOpen ? ' open' : '');
  menu.innerHTML = TABS.map(t => `
    <button class="tab-btn ${state.tab===t.id?'active':''}" data-tab="${t.id}">
      <span>${t.icon}</span><span>${t.label}</span>
    </button>
  `).join('');
  menu.querySelectorAll('[data-tab]').forEach(btn => btn.onclick = () => { state.tab = btn.dataset.tab; render(); });
}
function updateSidebar(){
  const { totalActivos, balance } = totals();
  document.getElementById('capitalTotal').textContent = fmt(totalActivos);
  const el = document.getElementById('capitalNeto');
  el.textContent = `${balance >= 0 ? '↑' : '↓'} ${fmt(Math.abs(balance))} neto`;
  el.className = 'sub ' + (balance >= 0 ? 'ok' : 'bad');
}
function renderResumen(){
  const root = document.getElementById('tab-resumen');
  const { totalIng, totalGasto, balance } = totals();
  const gastos = groupByCat('gasto');
  const ingresos = groupByCat('ingreso');
  const map = txnsByDateMap();
  const [yy,mm] = state.calDate.split('-').map(Number);
  const firstDay = new Date(yy, mm-1, 1).getDay();
  const daysInMonth = new Date(yy, mm, 0).getDate();
  const selectedTxns = state.txns.filter(t => t.fecha === state.calDate);

  let cells = '';
  ['D','L','M','M','J','V','S'].forEach(d => cells += `<div class="cal-head">${d}</div>`);
  for(let i=0;i<firstDay;i++) cells += `<div></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const ds = `${yy}-${String(mm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const val = map[ds];
    const isSel = state.calDate === ds;
    const isToday = ds === todayStr();
    let style = '';
    if(isSel) style = 'background:#6366f1;color:#fff;font-weight:800';
    else if(isToday) style = 'background:#f0f0fb;color:#6366f1;font-weight:800';
    cells += `<div class="cal-cell" style="${style}" data-date="${ds}">${d}${val!==undefined?`<div class="dot" style="background:${isSel?'rgba(255,255,255,.75)':val>=0?'#10b981':'#ef4444'}"></div>`:''}</div>`;
  }

  root.innerHTML = `
    <div class="title">Resumen</div>
    <div class="cards-3">
      <div class="card">
        <div class="head-row"><div class="stat-label">Ingresos</div><div class="stat-icon" style="background:#f0fdf8;color:#10b981">↑</div></div>
        <div class="stat-val" style="color:#10b981">${fmt(totalIng)}</div>
      </div>
      <div class="card">
        <div class="head-row"><div class="stat-label">Gastos</div><div class="stat-icon" style="background:#fef2f2;color:#ef4444">↓</div></div>
        <div class="stat-val" style="color:#ef4444">${fmt(totalGasto)}</div>
      </div>
      <div class="card">
        <div class="head-row"><div class="stat-label">Balance neto</div><div class="stat-icon" style="background:#f0f0fb;color:${balance>=0?'#6366f1':'#ef4444'}">=</div></div>
        <div class="stat-val" style="color:${balance>=0?'#6366f1':'#ef4444'}">${fmt(balance)}</div>
      </div>
    </div>
    <div class="cards-2">
      <div class="card">
        <div class="section-title">Calendario</div>
        <div class="calendar-top">
          <button id="prevMonth" class="btn btn-ghost" style="padding:5px 12px">‹</button>
          <div style="font-size:13px;font-weight:700;color:#374151">${new Date(yy, mm-1).toLocaleString('es-AR',{month:'long', year:'numeric'})}</div>
          <button id="nextMonth" class="btn btn-ghost" style="padding:5px 12px">›</button>
        </div>
        <div class="cal-grid">${cells}</div>
        <div style="border-top:1.5px solid #f0f0f5;padding-top:12px;margin-top:8px">
          <div class="small muted" style="font-weight:700;margin-bottom:8px">${state.calDate}</div>
          ${selectedTxns.length ? selectedTxns.map(t => `
            <div class="row-hover">
              <span style="color:#6b7280;font-size:13px">${esc(t.categoria)}</span>
              <span style="font-size:13px;font-weight:800;color:${t.tipo==='ingreso'?'#10b981':'#ef4444'}">${t.tipo==='ingreso'?'+':'-'}${fmt(t.monto)}</span>
            </div>
          `).join('') : `<div class="empty" style="padding:8px 0">Sin movimientos</div>`}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        ${pieCard('Gastos por categoría', gastos, PALETTE)}
        ${pieCard('Ingresos por categoría', ingresos, ['#10b981','#6366f1','#f59e0b','#3b82f6','#ec4899','#14b8a6','#8b5cf6'])}
      </div>
    </div>
    <div class="card">
      <div class="section-title">Últimos movimientos</div>
      ${state.txns.length ? state.txns.slice(0,6).map(t => `
        <div class="row-hover">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:34px;height:34px;border-radius:10px;background:${t.tipo==='ingreso'?'#f0fdf8':'#fef2f2'};display:flex;align-items:center;justify-content:center;font-size:14px;color:${t.tipo==='ingreso'?'#10b981':'#ef4444'};font-weight:800">${t.tipo==='ingreso'?'↑':'↓'}</div>
            <div>
              <div style="font-size:13px;font-weight:700">${esc(t.categoria)}</div>
              <div style="font-size:11px;color:#9ca3af">${esc(t.fecha)}${t.descripcion ? ' · ' + esc(t.descripcion) : ''}</div>
            </div>
          </div>
          <span style="font-size:15px;font-weight:800;font-family:'Syne',sans-serif;color:${t.tipo==='ingreso'?'#10b981':'#ef4444'}">${t.tipo==='ingreso'?'+':'-'}${fmt(t.monto)}</span>
        </div>
      `).join('') : `<div class="empty">Todavía no hay movimientos.</div>`}
    </div>
  `;

  root.querySelectorAll('[data-date]').forEach(el => el.onclick = () => { state.calDate = el.dataset.date; renderResumen(); });
  document.getElementById('prevMonth').onclick = () => {
    const d = new Date(yy, mm-2, 1);
    state.calDate = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
    renderResumen();
  };
  document.getElementById('nextMonth').onclick = () => {
    const d = new Date(yy, mm, 1);
    state.calDate = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
    renderResumen();
  };
}
function pieCard(title, data, colors){
  if(!data.length){
    return `<div class="card"><div class="section-title">${title}</div><div class="empty" style="padding:14px">Sin datos</div></div>`;
  }
  const total = data.reduce((a,[,v]) => a + v, 0);
  let cum = -90;
  const cx = 64, cy = 64, r = 52;
  const slices = data.map(([cat,val],i) => {
    const pct = val/total, angle = pct * 360;
    const s = (cum*Math.PI)/180; cum += angle; const e = (cum*Math.PI)/180;
    const x1 = cx + r*Math.cos(s), y1 = cy + r*Math.sin(s), x2 = cx + r*Math.cos(e), y2 = cy + r*Math.sin(e);
    return `<path d="M${cx},${cy} L${x1},${y1} A${r},${r},0,${angle>180?1:0},1,${x2},${y2} Z" fill="${colors[i % colors.length]}"></path>`;
  }).join('');
  const legend = data.slice(0,6).map(([cat,val],i) => `
    <div class="legend-row">
      <div class="legend-left truncate"><span class="sw" style="background:${colors[i % colors.length]}"></span><span class="truncate">${esc(cat)}</span></div>
      <strong>${Math.round(val/total*100)}%</strong>
    </div>
  `).join('');
  return `
    <div class="card">
      <div class="section-title">${title}</div>
      <div class="pie-wrap">
        <svg width="128" height="128" viewBox="0 0 128 128" aria-hidden="true">${slices}<circle cx="64" cy="64" r="24" fill="#fff"></circle></svg>
        <div class="legend">${legend}</div>
      </div>
    </div>
  `;
}
function renderMovimientos(){
  const root = document.getElementById('tab-movimientos');
  const options = (state.formTipo === 'gasto' ? CATS_GASTO : CATS_INGRESO).map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  root.innerHTML = `
    <div class="title">Movimientos</div>
    <div class="content-grid">
      <div class="card">
        <div class="section-title">Nuevo movimiento</div>
        <div class="seg">
          <button id="tipo-gasto" class="seg-btn ${state.formTipo==='gasto'?'active':''}">↓ Gasto</button>
          <button id="tipo-ingreso" class="seg-btn ${state.formTipo==='ingreso'?'active':''}">↑ Ingreso</button>
        </div>
        <div class="form-stack">
          <div><label class="label">Categoría</label><select id="txnCategoria" class="field">${options}</select></div>
          <div><label class="label">Monto</label><input id="txnMonto" class="field" type="number" placeholder="0.00"></div>
          <div><label class="label">Fecha</label><input id="txnFecha" class="field" type="date" value="${todayStr()}"></div>
          <div><label class="label">Descripción</label><input id="txnDesc" class="field" type="text" placeholder="Opcional"></div>
          <button id="addTxn" class="btn btn-indigo">Agregar</button>
        </div>
      </div>
      <div class="card">
        <div class="section-title">Historial</div>
        <div style="max-height:520px;overflow:auto">
          ${state.txns.length ? state.txns.map(t => `
            <div class="row-hover">
              <div style="display:flex;align-items:center;gap:12px">
                <div style="width:8px;height:8px;border-radius:50%;background:${t.tipo==='ingreso'?'#10b981':'#ef4444'}"></div>
                <div>
                  <div style="display:flex;align-items:center;gap:7px">
                    <span style="font-size:13px;font-weight:700">${esc(t.categoria)}</span>
                    <span class="badge" style="background:${t.tipo==='ingreso'?'#f0fdf8':'#fef2f2'};color:${t.tipo==='ingreso'?'#10b981':'#ef4444'}">${esc(t.tipo)}</span>
                  </div>
                  <div style="font-size:11px;color:#9ca3af">${esc(t.fecha)}${t.descripcion ? ' · ' + esc(t.descripcion) : ''}</div>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:12px">
                <span style="font-size:15px;font-weight:800;font-family:'Syne',sans-serif;color:${t.tipo==='ingreso'?'#10b981':'#ef4444'}">${t.tipo==='ingreso'?'+':'-'}${fmt(t.monto)}</span>
                <button class="delete-btn" data-del-txn="${t.id}">✕</button>
              </div>
            </div>
          `).join('') : `<div class="empty">Sin movimientos</div>`}
        </div>
      </div>
    </div>
  `;
  document.getElementById('tipo-gasto').onclick = () => { state.formTipo = 'gasto'; renderMovimientos(); };
  document.getElementById('tipo-ingreso').onclick = () => { state.formTipo = 'ingreso'; renderMovimientos(); };
  document.getElementById('addTxn').onclick = () => {
    const categoria = document.getElementById('txnCategoria').value;
    const monto = Number(document.getElementById('txnMonto').value);
    const fecha = document.getElementById('txnFecha').value || todayStr();
    const descripcion = document.getElementById('txnDesc').value.trim();
    if(!monto || monto <= 0) return;
    state.txns.unshift({ id: Date.now(), tipo: state.formTipo, categoria, monto, descripcion, fecha });
    save('ct_txns', state.txns);
    render();
  };
  root.querySelectorAll('[data-del-txn]').forEach(btn => btn.onclick = () => {
    state.txns = state.txns.filter(t => String(t.id) !== btn.dataset.delTxn);
    save('ct_txns', state.txns);
    render();
  });
}
function renderActivos(){
  const root = document.getElementById('tab-activos');
  const { totalActivos } = totals();
  const virtual = state.wallets.filter(w => ['virtual','cripto','inversión'].includes(w.tipo)).reduce((a,w)=>a+Number(w.saldo||0),0);
  const fisico = state.wallets.filter(w => w.tipo === 'físico').reduce((a,w)=>a+Number(w.saldo||0),0);
  root.innerHTML = `
    <div class="title">Activos e Inversiones</div>
    <div class="cards-3">
      <div class="card"><div class="stat-label">Total activos</div><div class="stat-val" style="color:#6366f1">${fmt(totalActivos)}</div></div>
      <div class="card"><div class="stat-label">Virtual / Cripto</div><div class="stat-val" style="color:#3b82f6">${fmt(virtual)}</div></div>
      <div class="card"><div class="stat-label">Físico / Efectivo</div><div class="stat-val" style="color:#f59e0b">${fmt(fisico)}</div></div>
    </div>
    <div class="assets-grid">
      <div class="card">
        <div class="section-title">Mis billeteras</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${state.wallets.length ? state.wallets.map((w,i) => {
            const color = PALETTE[i % PALETTE.length];
            const pct = totalActivos > 0 ? (Number(w.saldo)/totalActivos*100) : 0;
            const icon = w.tipo === 'virtual' ? '📱' : w.tipo === 'cripto' ? '₿' : w.tipo === 'inversión' ? '📈' : '💵';
            return `
              <div class="wallet">
                <div class="wallet-left">
                  <div class="wallet-icon" style="background:${color}18">${icon}</div>
                  <div>
                    <div style="font-size:14px;font-weight:700">${esc(w.nombre)}</div>
                    <div style="display:flex;gap:5px;margin-top:3px">
                      <span class="badge" style="background:${color}18;color:${color}">${esc(w.tipo)}</span>
                      <span class="badge" style="background:#f0f0f5;color:#9ca3af">${esc(w.moneda)}</span>
                    </div>
                  </div>
                </div>
                <div class="wallet-actions">
                  <span style="font-size:17px;font-weight:800;font-family:'Syne',sans-serif;color:${color};min-width:110px;text-align:right">${fmt(w.saldo)}</span>
                  <button class="delete-btn" data-del-wallet="${w.id}">✕</button>
                </div>
              </div>
              ${totalActivos > 0 ? `
                <div style="margin:-2px 0 6px 0">
                  <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#6b7280">${esc(w.nombre)}</span><span style="font-weight:700;color:${color}">${pct.toFixed(1)}%</span></div>
                  <div class="bar"><div style="width:${pct}%;background:${color}"></div></div>
                </div>
              ` : ''}
            `;
          }).join('') : `<div class="empty">Sin billeteras</div>`}
        </div>
      </div>
      <div class="card" style="height:fit-content">
        <div class="section-title">Agregar billetera</div>
        <div class="form-stack">
          <div><label class="label">Nombre</label><input id="walletNombre" class="field" type="text" placeholder="Ej: Brubank"></div>
          <div><label class="label">Tipo</label><select id="walletTipo" class="field"><option>virtual</option><option>físico</option><option>inversión</option><option>cripto</option></select></div>
          <div><label class="label">Saldo inicial</label><input id="walletSaldo" class="field" type="number" placeholder="0.00"></div>
          <div><label class="label">Moneda</label><select id="walletMoneda" class="field"><option>ARS</option><option>USD</option><option>EUR</option><option>USDT</option><option>BTC</option></select></div>
          <button id="addWallet" class="btn btn-indigo">Agregar</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('addWallet').onclick = () => {
    const nombre = document.getElementById('walletNombre').value.trim();
    const tipo = document.getElementById('walletTipo').value;
    const saldo = Number(document.getElementById('walletSaldo').value || 0);
    const moneda = document.getElementById('walletMoneda').value;
    if(!nombre) return;
    state.wallets.push({ id: Date.now(), nombre, tipo, saldo, moneda });
    save('ct_wallets', state.wallets);
    render();
  };
  root.querySelectorAll('[data-del-wallet]').forEach(btn => btn.onclick = () => {
    state.wallets = state.wallets.filter(w => String(w.id) !== btn.dataset.delWallet);
    save('ct_wallets', state.wallets);
    render();
  });
}
function renderSidebarShell(){
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('sidebarCollapse');
  const app = document.querySelector('.app');
  sidebar.classList.toggle('collapsed', !state.sidebarOpen);
  app.classList.toggle('sidebar-collapsed', !state.sidebarOpen);
  btn.innerHTML = state.sidebarOpen ? '◀' : '▶';
  btn.setAttribute('aria-label', state.sidebarOpen ? 'Cerrar menú lateral' : 'Abrir menú lateral');
}
function render(){
  renderSidebarShell();
  renderMenu();
  updateSidebar();
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.add('hide'));
  document.getElementById('tab-' + state.tab).classList.remove('hide');
  renderResumen();
  renderMovimientos();
  renderActivos();
}

document.getElementById('menuToggle').onclick = () => { state.menuOpen = !state.menuOpen; renderMenu(); };
document.getElementById('sidebarCollapse').onclick = () => { state.sidebarOpen = !state.sidebarOpen; renderSidebarShell(); };
render();
</script>
</body>
</html>
