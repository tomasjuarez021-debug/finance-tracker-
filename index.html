<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>capital.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0e11;
      --surface: #161a1f;
      --surface2: #1e2329;
      --border: #2b3139;
      --border2: #363c45;
      --text: #eaecef;
      --text2: #848e9c;
      --text3: #5a6270;
      --accent: #f0b90b;
      --green: #0ecb81;
      --red: #f6465d;
      --blue: #4a9eff;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);font-weight:400;font-size:14px}
    button,input,select{font-family:inherit}
    button{cursor:pointer}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
    select option{background:var(--surface2);color:var(--text)}

    /* ─── LAYOUT ─── */
    .app{display:flex;min-height:100vh}
    .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:24px 12px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow:hidden;transition:width .2s ease,padding .2s ease,opacity .15s ease}
    .sidebar.collapsed{width:0;padding:24px 0;border-right:none;opacity:0;pointer-events:none}
    .sidebar-collapse{position:fixed;left:208px;top:50%;transform:translateY(-50%);width:16px;height:48px;border:1px solid var(--border);border-left:none;border-radius:0 6px 6px 0;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:10px;z-index:20;transition:left .2s ease}
    .sidebar-collapse:hover{background:var(--surface2);color:var(--text)}
    .sidebar-collapsed .sidebar-collapse{left:0;border-left:1px solid var(--border)}
    .sidebar-collapsed .main{padding-left:32px}

    .brand{font-family:var(--mono);font-weight:600;font-size:18px;letter-spacing:-0.5px;padding:8px 12px 16px;color:var(--text)}
    .brand span{color:var(--accent)}

    .tab-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border:none;border-radius:6px;background:transparent;color:var(--text2);font-size:13px;font-weight:400;text-align:left;width:100%;transition:.12s;letter-spacing:.2px}
    .tab-btn:hover{background:var(--surface2);color:var(--text)}
    .tab-btn.active{background:var(--surface2);color:var(--accent);font-weight:500}
    .tab-btn .icon{font-family:var(--mono);font-size:11px;width:18px;text-align:center;color:var(--text3)}
    .tab-btn.active .icon{color:var(--accent)}

    .side-card{margin-top:auto;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px}
    .side-card .k{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:var(--mono)}
    .side-card .v{font-size:20px;font-weight:500;font-family:var(--mono);color:var(--text)}
    .side-card .sub{font-size:11px;font-weight:400;margin-top:4px;font-family:var(--mono)}
    .sub.ok{color:var(--green)}.sub.bad{color:var(--red)}

    .main{flex:1;padding:28px 24px;overflow:auto}

    /* ─── TYPOGRAPHY ─── */
    .page-title{font-family:var(--mono);font-size:18px;font-weight:500;margin-bottom:20px;letter-spacing:-0.3px;color:var(--text);border-bottom:1px solid var(--border);padding-bottom:14px}
    .section-title{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}

    /* ─── CARDS ─── */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px}
    .cards-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
    .cards-2{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;margin-bottom:16px}
    .content-grid{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}
    .assets-grid{display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start}
    .invest-grid{display:grid;grid-template-columns:320px 1fr;gap:16px;align-items:start}

    .stat-label{font-family:var(--mono);font-size:10px;font-weight:400;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .stat-val{font-family:var(--mono);font-size:22px;font-weight:500;letter-spacing:-0.5px;color:var(--text)}
    .stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}.stat-val.yellow{color:var(--accent)}

    /* ─── FORMS ─── */
    .field{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-size:13px;font-family:var(--mono);color:var(--text);outline:none;transition:.12s}
    .field:focus{border-color:var(--accent);background:var(--surface2)}
    .field::placeholder{color:var(--text3)}
    .label{display:block;font-family:var(--mono);font-size:10px;font-weight:400;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
    .form-stack{display:flex;flex-direction:column;gap:10px}

    /* ─── BUTTONS ─── */
    .btn{border:none;border-radius:6px;padding:9px 16px;font-size:13px;font-weight:500;font-family:var(--mono);letter-spacing:.3px;transition:.12s}
    .btn-accent{background:var(--accent);color:#0b0e11}
    .btn-accent:hover{background:#f8c914}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
    .btn-ghost:hover{border-color:var(--border2);color:var(--text)}
    .btn-danger{background:transparent;border:1px solid var(--border);color:var(--red);font-size:11px;padding:5px 9px;border-radius:4px}
    .btn-danger:hover{background:rgba(246,70,93,.1)}

    /* ─── SEGMENT ─── */
    .seg{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px;gap:3px;margin-bottom:14px}
    .seg-btn{flex:1;border:none;border-radius:4px;padding:7px 0;background:transparent;color:var(--text2);font-size:12px;font-weight:400;font-family:var(--mono);letter-spacing:.3px;transition:.12s}
    .seg-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}

    /* ─── TABLE ROWS ─── */
    .row-hover{display:flex;align-items:center;justify-content:space-between;padding:10px 8px;border-bottom:1px solid var(--border)}
    .row-hover:last-child{border-bottom:none}
    .row-hover:hover{background:var(--surface2)}
    .amount-positive{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--green)}
    .amount-negative{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--red)}
    .amount-neutral{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text)}

    /* ─── BADGES ─── */
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:500;font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}
    .badge-green{background:rgba(14,203,129,.12);color:var(--green)}
    .badge-red{background:rgba(246,70,93,.12);color:var(--red)}
    .badge-yellow{background:rgba(240,185,11,.12);color:var(--accent)}
    .badge-blue{background:rgba(74,158,255,.12);color:var(--blue)}
    .badge-gray{background:var(--surface2);color:var(--text2)}

    /* ─── CALENDAR ─── */
    .calendar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
    .cal-head{font-family:var(--mono);font-size:9px;font-weight:400;color:var(--text3);padding-bottom:5px;letter-spacing:.5px}
    .cal-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;height:32px;font-family:var(--mono);font-size:12px;font-weight:400;color:var(--text2);transition:.1s}
    .cal-cell:hover{background:var(--surface2);color:var(--text)}
    .dot{width:4px;height:4px;border-radius:50%;margin-top:2px}

    /* ─── WALLET CARD ─── */
    .wallet{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface2);border-radius:6px;border:1px solid var(--border)}
    .wallet:hover{border-color:var(--border2)}
    .wallet-left{display:flex;align-items:center;gap:12px}
    .wallet-tag{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
    .wallet-amount{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--text)}
    .wallet-actions{display:flex;align-items:center;gap:8px}

    /* ─── BARS ─── */
    .bar{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:6px}
    .bar > div{height:100%;border-radius:3px}

    /* ─── PIE CHART ─── */
    .pie-wrap{display:flex;align-items:center;gap:14px}
    .legend{display:flex;flex-direction:column;gap:5px;flex:1}
    .legend-row{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px}
    .legend-left{display:flex;align-items:center;gap:8px;min-width:0}
    .sw{width:8px;height:8px;border-radius:2px;flex-shrink:0}
    .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono);font-size:11px;color:var(--text2)}
    .legend-pct{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text)}

    /* ─── INVEST ─── */
    .invest-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px}
    .invest-name{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text)}
    .invest-rate{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--accent)}
    .invest-meta{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
    .projected-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12px}
    .projected-row:last-child{border-bottom:none}

    /* ─── NOTIFICATION TOAST ─── */
    .toast{position:fixed;bottom:80px;right:20px;background:var(--surface2);border:1px solid var(--accent);border-radius:6px;padding:10px 16px;font-family:var(--mono);font-size:12px;color:var(--text);z-index:100;opacity:0;transform:translateY(8px);transition:.2s;pointer-events:none}
    .toast.show{opacity:1;transform:translateY(0)}

    /* ─── MISC ─── */
    .empty{padding:24px;text-align:center;color:var(--text3);font-family:var(--mono);font-size:12px;letter-spacing:.5px}
    .muted{color:var(--text2)}
    .hide{display:none}
    .head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .divider{height:1px;background:var(--border);margin:14px 0}
    .ticker{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.5px}

    /* ─── WALLET SELECTOR IN FORM ─── */
    .wallet-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
    .wallet-pill{border:1px solid var(--border);border-radius:4px;padding:5px 10px;background:transparent;color:var(--text2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:.1s}
    .wallet-pill:hover{border-color:var(--border2);color:var(--text)}
    .wallet-pill.selected{border-color:var(--accent);color:var(--accent);background:rgba(240,185,11,.06)}

    /* ─── BOTTOM NAV ─── */
    .bottom-nav{display:none}

    /* ─── MOBILE HEADER ─── */
    .mobile-header{display:none}

    @media (max-width: 1100px){
      .cards-3,.cards-2,.content-grid,.assets-grid,.invest-grid{grid-template-columns:1fr}
      .sidebar{width:200px}
    }
    @media (max-width: 780px){
      .sidebar{display:none}
      .sidebar-collapse{display:none}
      .app{flex-direction:column;padding-bottom:68px}
      .main{padding:14px 12px 8px}
      .mobile-header{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:30}
      .mobile-brand{font-family:var(--mono);font-weight:600;font-size:16px;color:var(--text)}
      .mobile-brand span{color:var(--accent)}
      .mobile-capital .v{font-family:var(--mono);font-size:15px;font-weight:500;text-align:right}
      .mobile-capital .sub{font-family:var(--mono);font-size:10px;text-align:right;margin-top:2px}
      .cards-3{display:flex;overflow-x:auto;gap:8px;padding-bottom:4px}
      .cards-3 .card{min-width:130px;flex-shrink:0}
      .cards-3::-webkit-scrollbar{display:none}
      .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--surface);border-top:1px solid var(--border);z-index:40;padding:0 4px}
      .bottom-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--text3);font-size:10px;font-family:var(--mono);padding:6px 4px;border-radius:6px;transition:.12s;letter-spacing:.3px}
      .bottom-nav-btn.active{color:var(--accent)}
    }
  </style>
</head>
<body>

<header class="mobile-header">
  <div class="mobile-brand">capital<span>.</span></div>
  <div class="mobile-capital">
    <div id="mobileCapitalTotal" class="v">$0,00</div>
    <div id="mobileCapitalNeto" class="sub ok">+$0,00 neto</div>
  </div>
</header>
<nav class="bottom-nav" id="bottomNav"></nav>
<div class="toast" id="toast"></div>

<div class="app">
  <button id="sidebarCollapse" class="sidebar-collapse" aria-label="Toggle sidebar">▶</button>
  <aside id="sidebar" class="sidebar">
    <div class="brand">capital<span>.</span></div>
    <nav id="menu"></nav>
    <div class="side-card">
      <div class="k">Capital total</div>
      <div id="capitalTotal" class="v">$0,00</div>
      <div id="capitalNeto" class="sub ok">+$0,00 neto</div>
    </div>
  </aside>
  <main class="main">
    <section id="tab-resumen" class="tab-panel"></section>
    <section id="tab-movimientos" class="tab-panel hide"></section>
    <section id="tab-activos" class="tab-panel hide"></section>
    <section id="tab-inversiones" class="tab-panel hide"></section>
  </main>
</div>

<script>
// ─── CONSTANTS ───
const CATS_GASTO = ["Alimentación","Transporte","Vivienda","Salud","Entretenimiento","Ropa","Educación","Servicios","Deuda","Otros"];
const CATS_INGRESO = ["Salario","Freelance","Inversiones","Alquiler","Rendimiento","Regalo","Bono","Otros"];
const PALETTE = ["#f0b90b","#0ecb81","#4a9eff","#f6465d","#9b6dff","#00c2ff","#ff6b35","#14b8a6","#e879f9"];
const TABS = [
  {id:"resumen",    label:"Resumen",     icon:"▣"},
  {id:"movimientos",label:"Movimientos", icon:"↕"},
  {id:"activos",    label:"Activos",     icon:"◈"},
  {id:"inversiones",label:"Inversiones", icon:"△"},
];
const INIT_WALLETS = [
  {id:1, nombre:"Efectivo",     tipo:"físico",   saldo:0, moneda:"ARS"},
  {id:2, nombre:"Mercado Pago", tipo:"virtual",  saldo:0, moneda:"ARS"},
  {id:3, nombre:"Ualá",         tipo:"virtual",  saldo:0, moneda:"ARS"},
];
const INIT_INVEST = [
  {id:1, nombre:"Plazo Fijo ARS",   tna:75, capital:0, moneda:"ARS", tipo:"plazo_fijo"},
  {id:2, nombre:"FCI Renta Mixta",  tna:40, capital:0, moneda:"ARS", tipo:"fci"},
];

// ─── STATE ───
const state = {
  tab: 'resumen',
  sidebarOpen: true,
  calDate: todayStr(),
  formTipo: 'gasto',
  formWallet: null,
  txns:    load('ct_txns',    []),
  wallets: load('ct_wallets', INIT_WALLETS),
  invest:  load('ct_invest',  INIT_INVEST),
};

// ─── UTILS ───
function load(k,fb){ try{return JSON.parse(localStorage.getItem(k))??fb;}catch{return fb;} }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function fmt(n,mono=true){ return `$${Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}`; }
function fmtPct(n){ return `${Number(n||0).toFixed(2)}%`; }
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function esc(s){ return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function groupByCat(tipo){
  const m={};
  state.txns.filter(t=>t.tipo===tipo).forEach(t=>m[t.categoria]=(m[t.categoria]||0)+Number(t.monto));
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function totals(){
  const totalActivos = state.wallets.reduce((a,w)=>a+Number(w.saldo||0),0);
  const totalIng    = state.txns.filter(t=>t.tipo==='ingreso').reduce((a,t)=>a+Number(t.monto),0);
  const totalGasto  = state.txns.filter(t=>t.tipo==='gasto' ).reduce((a,t)=>a+Number(t.monto),0);
  const totalInvest = state.invest.reduce((a,i)=>a+Number(i.capital||0),0);
  return { totalActivos, totalIng, totalGasto, balance: totalIng-totalGasto, totalInvest };
}
function txnsByDateMap(){
  const m={};
  state.txns.forEach(t=>{
    if(!m[t.fecha]) m[t.fecha]=0;
    m[t.fecha]+= t.tipo==='ingreso'?Number(t.monto):-Number(t.monto);
  });
  return m;
}
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// ─── APPLY TXN TO WALLET ───
function applyTxnToWallet(txn, walletId, multiplier=1){
  const w = state.wallets.find(x=>x.id===walletId);
  if(!w) return;
  const delta = Number(txn.monto) * multiplier * (txn.tipo==='ingreso'?1:-1);
  w.saldo = Number(w.saldo||0) + delta;
  save('ct_wallets', state.wallets);
}

// ─── PROJECTED YIELD ───
function proyectar(capital, tna, meses){
  // TNA → TEM → compound
  const tem = Math.pow(1 + tna/100, 1/12) - 1;
  return capital * Math.pow(1+tem, meses);
}

// ─── RENDER MENU ───
function renderMenu(){
  const menuEl = document.getElementById('menu');
  menuEl.innerHTML = TABS.map(t=>`
    <button class="tab-btn ${state.tab===t.id?'active':''}" data-tab="${t.id}">
      <span class="icon">${t.icon}</span>${t.label}
    </button>
  `).join('');
  menuEl.querySelectorAll('[data-tab]').forEach(btn=>btn.onclick=()=>{state.tab=btn.dataset.tab;render();});
}

// ─── UPDATE SIDEBAR ───
function updateSidebar(){
  const {totalActivos,balance} = totals();
  document.getElementById('capitalTotal').textContent = fmt(totalActivos);
  const el = document.getElementById('capitalNeto');
  el.textContent = `${balance>=0?'+':'-'}${fmt(Math.abs(balance))} neto`;
  el.className='sub '+(balance>=0?'ok':'bad');
  const mct=document.getElementById('mobileCapitalTotal');
  const mcn=document.getElementById('mobileCapitalNeto');
  if(mct) mct.textContent=fmt(totalActivos);
  if(mcn){mcn.textContent=el.textContent; mcn.className=el.className;}

  // Bottom nav
  const nav=document.getElementById('bottomNav');
  if(nav){
    nav.innerHTML=TABS.map(t=>`
      <button class="bottom-nav-btn ${state.tab===t.id?'active':''}" data-tab="${t.id}">
        <span style="font-size:16px;line-height:1">${t.icon}</span>
        <span>${t.label}</span>
      </button>`).join('');
    nav.querySelectorAll('[data-tab]').forEach(btn=>btn.onclick=()=>{state.tab=btn.dataset.tab;render();});
  }
}

// ─── RENDER SIDEBAR SHELL ───
function renderSidebarShell(){
  const sidebar=document.getElementById('sidebar');
  const btn=document.getElementById('sidebarCollapse');
  const app=document.querySelector('.app');
  sidebar.classList.toggle('collapsed',!state.sidebarOpen);
  app.classList.toggle('sidebar-collapsed',!state.sidebarOpen);
  btn.style.left = state.sidebarOpen ? '208px' : '0';
  btn.textContent = state.sidebarOpen ? '◀' : '▶';
}

// ─── PIE CARD ───
function pieCard(title, data, colors){
  if(!data.length) return `<div class="card"><div class="section-title">${title}</div><div class="empty">SIN DATOS</div></div>`;
  const total = data.reduce((a,[,v])=>a+v,0);
  let cum=-90;
  const cx=56,cy=56,r=46;
  const slices = data.map(([cat,val],i)=>{
    const pct=val/total, angle=pct*360;
    const s=(cum*Math.PI)/180; cum+=angle; const e=(cum*Math.PI)/180;
    const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
    return `<path d="M${cx},${cy} L${x1},${y1} A${r},${r},0,${angle>180?1:0},1,${x2},${y2} Z" fill="${colors[i%colors.length]}"></path>`;
  }).join('');
  const legend = data.slice(0,6).map(([cat,val],i)=>`
    <div class="legend-row">
      <div class="legend-left"><span class="sw" style="background:${colors[i%colors.length]}"></span><span class="truncate">${esc(cat)}</span></div>
      <span class="legend-pct">${Math.round(val/total*100)}%</span>
    </div>`).join('');
  return `
    <div class="card">
      <div class="section-title">${title}</div>
      <div class="pie-wrap">
        <svg width="112" height="112" viewBox="0 0 112 112">${slices}<circle cx="56" cy="56" r="20" fill="#161a1f"></circle></svg>
        <div class="legend">${legend}</div>
      </div>
    </div>`;
}

              <div style="display:flex;align-items:center;gap:10px">

    if(txn&&txn.walletId) applyTxnToWallet(txn, txn.walletId, -1); // revert
    state.txns=state.txns.filter(t=>String(t.id)!==btn.dataset.delTxn);
    save('ct_txns',state.txns);
    render();
  });

          <div class="section-title">SIMULADOR</div>
          <div class="form-stack">
            <div><label class="label">Capital a simular</label><input id="simCap" class="field" type="number" placeholder="100000"></div>
            <div><label class="label">TNA %</label><input id="simTna" class="field" type="number" placeholder="75"></div>
            <button id="simBtn" class="btn btn-ghost" style="width:100%">CALCULAR</button>
          </div>
          <div id="simResult" style="margin-top:12px"></div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('addInvest').onclick=()=>{
    const nombre=document.getElementById('invNombre').value.trim();
    const tipo=document.getElementById('invTipo').value;
    const tna=Number(document.getElementById('invTna').value);
    const capital=Number(document.getElementById('invCapital').value||0);
    const moneda=document.getElementById('invMoneda').value;
    if(!nombre||!tna) return;
    state.invest.push({id:Date.now(),nombre,tipo,tna,capital,moneda});
    save('ct_invest',state.invest);
    render();
  };

  root.querySelectorAll('[data-del-inv]').forEach(btn=>btn.onclick=()=>{
    state.invest=state.invest.filter(i=>String(i.id)!==btn.dataset.delInv);
    save('ct_invest',state.invest);
    render();
  });

  root.querySelectorAll('[data-inv-cap]').forEach(input=>input.onchange=()=>{
    const id=Number(input.dataset.invCap);
    const val=Number(input.value);
    if(isNaN(val)||val<0) return;
    const inv=state.invest.find(i=>i.id===id);
    if(inv){inv.capital=val;save('ct_invest',state.invest);renderInversiones();}
  });

  document.getElementById('simBtn').onclick=()=>{
    const cap=Number(document.getElementById('simCap').value);
    const tna=Number(document.getElementById('simTna').value);
    if(!cap||!tna){document.getElementById('simResult').innerHTML='';return;}
    const r3=proyectar(cap,tna,3)-cap;
    const r6=proyectar(cap,tna,6)-cap;
    const r12=proyectar(cap,tna,12)-cap;
    const r24=proyectar(cap,tna,24)-cap;
    document.getElementById('simResult').innerHTML=`
      <div style="background:var(--bg);border-radius:6px;border:1px solid var(--border);padding:10px">
        <div class="invest-meta" style="margin-bottom:8px">CAPITAL: ${fmt(cap)} · TNA: ${fmtPct(tna)}</div>
        <div class="projected-row"><span style="color:var(--text2)">3 meses</span><span class="amount-positive">+${fmt(r3)}</span></div>
        <div class="projected-row"><span style="color:var(--text2)">6 meses</span><span class="amount-positive">+${fmt(r6)}</span></div>
        <div class="projected-row"><span style="color:var(--text2)">12 meses</span><span class="amount-positive">+${fmt(r12)}</span></div>
        <div class="projected-row"><span style="color:var(--text2)">24 meses</span><span class="amount-positive">+${fmt(r24)}</span></div>
      </div>
    `;
  };
}

// ─── MAIN RENDER ───
function render(){
  renderSidebarShell();
  renderMenu();
  updateSidebar();
  document.querySelectorAll('.tab-panel').forEach(el=>el.classList.add('hide'));
  document.getElementById('tab-'+state.tab).classList.remove('hide');
  renderResumen();
  renderMovimientos();
  renderActivos();
  renderInversiones();
}

document.getElementById('sidebarCollapse').onclick=()=>{state.sidebarOpen=!state.sidebarOpen;renderSidebarShell();};
render();
</script>
</body>
</html>
