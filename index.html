<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>capital.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0e11;
      --surface: #161a1f;
      --surface2: #1e2329;
      --border: #2b3139;
      --border2: #363c45;
      --text: #eaecef;
      --text2: #848e9c;
      --text3: #5a6270;
      --accent: #f0b90b;
      --green: #0ecb81;
      --red: #f6465d;
      --blue: #4a9eff;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);font-weight:400;font-size:14px}
    button,input,select{font-family:inherit}
    button{cursor:pointer}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
    select option{background:var(--surface2);color:var(--text)}

    /* ─── LAYOUT ─── */
    .app{display:flex;min-height:100vh}
    .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:24px 12px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow:hidden;transition:width .2s ease,padding .2s ease,opacity .15s ease}
    .sidebar.collapsed{width:0;padding:24px 0;border-right:none;opacity:0;pointer-events:none}
    .sidebar-collapse{position:fixed;left:208px;top:50%;transform:translateY(-50%);width:16px;height:48px;border:1px solid var(--border);border-left:none;border-radius:0 6px 6px 0;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:10px;z-index:20;transition:left .2s ease}
    .sidebar-collapse:hover{background:var(--surface2);color:var(--text)}
    .sidebar-collapsed .sidebar-collapse{left:0;border-left:1px solid var(--border)}
    .sidebar-collapsed .main{padding-left:32px}

    .brand{font-family:var(--mono);font-weight:600;font-size:18px;letter-spacing:-0.5px;padding:8px 12px 16px;color:var(--text)}
    .brand span{color:var(--accent)}

    .tab-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border:none;border-radius:6px;background:transparent;color:var(--text2);font-size:13px;font-weight:400;text-align:left;width:100%;transition:.12s;letter-spacing:.2px}
    .tab-btn:hover{background:var(--surface2);color:var(--text)}
    .tab-btn.active{background:var(--surface2);color:var(--accent);font-weight:500}
    .tab-btn .icon{font-family:var(--mono);font-size:11px;width:18px;text-align:center;color:var(--text3)}
    .tab-btn.active .icon{color:var(--accent)}

    .side-card{margin-top:auto;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px}
    .side-card .k{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:var(--mono)}
    .side-card .v{font-size:20px;font-weight:500;font-family:var(--mono);color:var(--text)}
    .side-card .sub{font-size:11px;font-weight:400;margin-top:4px;font-family:var(--mono)}
    .sub.ok{color:var(--green)}.sub.bad{color:var(--red)}

    .main{flex:1;padding:28px 24px;overflow:auto}

    /* ─── TYPOGRAPHY ─── */
    .page-title{font-family:var(--mono);font-size:18px;font-weight:500;margin-bottom:20px;letter-spacing:-0.3px;color:var(--text);border-bottom:1px solid var(--border);padding-bottom:14px}
    .section-title{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}

    /* ─── CARDS ─── */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px}
    .cards-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
    .cards-2{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;margin-bottom:16px}
    .content-grid{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}
    .assets-grid{display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start}
    .invest-grid{display:grid;grid-template-columns:320px 1fr;gap:16px;align-items:start}

    .stat-label{font-family:var(--mono);font-size:10px;font-weight:400;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .stat-val{font-family:var(--mono);font-size:22px;font-weight:500;letter-spacing:-0.5px;color:var(--text)}
    .stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}.stat-val.yellow{color:var(--accent)}

    /* ─── FORMS ─── */
    .field{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-size:13px;font-family:var(--mono);color:var(--text);outline:none;transition:.12s}
    .field:focus{border-color:var(--accent);background:var(--surface2)}
    .field::placeholder{color:var(--text3)}
    .label{display:block;font-family:var(--mono);font-size:10px;font-weight:400;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
    .form-stack{display:flex;flex-direction:column;gap:10px}

    /* ─── BUTTONS ─── */
    .btn{border:none;border-radius:6px;padding:9px 16px;font-size:13px;font-weight:500;font-family:var(--mono);letter-spacing:.3px;transition:.12s}
    .btn-accent{background:var(--accent);color:#0b0e11}
    .btn-accent:hover{background:#f8c914}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
    .btn-ghost:hover{border-color:var(--border2);color:var(--text)}
    .btn-danger{background:transparent;border:1px solid var(--border);color:var(--red);font-size:11px;padding:5px 9px;border-radius:4px}
    .btn-danger:hover{background:rgba(246,70,93,.1)}

    /* ─── SEGMENT ─── */
    .seg{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px;gap:3px;margin-bottom:14px}
    .seg-btn{flex:1;border:none;border-radius:4px;padding:7px 0;background:transparent;color:var(--text2);font-size:12px;font-weight:400;font-family:var(--mono);letter-spacing:.3px;transition:.12s}
    .seg-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}

    /* ─── TABLE ROWS ─── */
    .row-hover{display:flex;align-items:center;justify-content:space-between;padding:10px 8px;border-bottom:1px solid var(--border)}
    .row-hover:last-child{border-bottom:none}
    .row-hover:hover{background:var(--surface2)}
    .amount-positive{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--green)}
    .amount-negative{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--red)}
    .amount-neutral{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text)}

    /* ─── BADGES ─── */
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:500;font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}
    .badge-green{background:rgba(14,203,129,.12);color:var(--green)}
    .badge-red{background:rgba(246,70,93,.12);color:var(--red)}
    .badge-yellow{background:rgba(240,185,11,.12);color:var(--accent)}
    .badge-blue{background:rgba(74,158,255,.12);color:var(--blue)}
    .badge-gray{background:var(--surface2);color:var(--text2)}

    /* ─── CALENDAR ─── */
    .calendar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
    .cal-head{font-family:var(--mono);font-size:9px;font-weight:400;color:var(--text3);padding-bottom:5px;letter-spacing:.5px}
    .cal-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;height:32px;font-family:var(--mono);font-size:12px;font-weight:400;color:var(--text2);transition:.1s}
    .cal-cell:hover{background:var(--surface2);color:var(--text)}
    .dot{width:4px;height:4px;border-radius:50%;margin-top:2px}

    /* ─── WALLET CARD ─── */
    .wallet{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface2);border-radius:6px;border:1px solid var(--border)}
    .wallet:hover{border-color:var(--border2)}
    .wallet-left{display:flex;align-items:center;gap:12px}
    .wallet-tag{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
    .wallet-amount{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--text)}
    .wallet-actions{display:flex;align-items:center;gap:8px}

    /* ─── BARS ─── */
    .bar{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:6px}
    .bar > div{height:100%;border-radius:3px}

    /* ─── PIE CHART ─── */
    .pie-wrap{display:flex;align-items:center;gap:14px}
    .legend{display:flex;flex-direction:column;gap:5px;flex:1}
    .legend-row{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px}
    .legend-left{display:flex;align-items:center;gap:8px;min-width:0}
    .sw{width:8px;height:8px;border-radius:2px;flex-shrink:0}
    .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono);font-size:11px;color:var(--text2)}
    .legend-pct{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text)}

    /* ─── INVEST ─── */
    .invest-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px}
    .invest-name{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text)}
    .invest-rate{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--accent)}
    .invest-meta{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
    .projected-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12px}
    .projected-row:last-child{border-bottom:none}

    /* ─── NOTIFICATION TOAST ─── */
    .toast{position:fixed;bottom:80px;right:20px;background:var(--surface2);border:1px solid var(--accent);border-radius:6px;padding:10px 16px;font-family:var(--mono);font-size:12px;color:var(--text);z-index:100;opacity:0;transform:translateY(8px);transition:.2s;pointer-events:none}
    .toast.show{opacity:1;transform:translateY(0)}

    /* ─── MISC ─── */
    .empty{padding:24px;text-align:center;color:var(--text3);font-family:var(--mono);font-size:12px;letter-spacing:.5px}
    .muted{color:var(--text2)}
    .hide{display:none}
    .head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .divider{height:1px;background:var(--border);margin:14px 0}
    .ticker{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.5px}

    /* ─── WALLET SELECTOR IN FORM ─── */
    .wallet-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
    .wallet-pill{border:1px solid var(--border);border-radius:4px;padding:5px 10px;background:transparent;color:var(--text2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:.1s}
    .wallet-pill:hover{border-color:var(--border2);color:var(--text)}
    .wallet-pill.selected{border-color:var(--accent);color:var(--accent);background:rgba(240,185,11,.06)}

    /* ─── MOBILE HEADER ─── */
    .mobile-header{display:none}

    @media (max-width: 1100px){
      .cards-3,.cards-2,.content-grid,.assets-grid,.invest-grid{grid-template-columns:1fr}
      .sidebar{width:200px}
    }
    @media (max-width: 780px){
      .sidebar{display:none}
      .sidebar-collapse{display:none}
      .app{flex-direction:column;padding-bottom:68px}
      .main{padding:14px 12px 8px}
      .mobile-header{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:30}
      .mobile-brand{font-family:var(--mono);font-weight:600;font-size:16px;color:var(--text)}
      .mobile-brand span{color:var(--accent)}
      .mobile-capital .v{font-family:var(--mono);font-size:15px;font-weight:500;text-align:right}
      .mobile-capital .sub{font-family:var(--mono);font-size:10px;text-align:right;margin-top:2px}
      .cards-3{display:flex;overflow-x:auto;gap:8px;padding-bottom:4px}
      .cards-3 .card{min-width:130px;flex-shrink:0}
      .cards-3::-webkit-scrollbar{display:none}
      .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--surface);border-top:1px solid var(--border);z-index:40;padding:0 4px}
      .bottom-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--text3);font-size:10px;font-family:var(--mono);padding:6px 4px;border-radius:6px;transition:.12s;letter-spacing:.3px}
      .bottom-nav-btn.active{color:var(--accent)}
    }
  </style>
<script id="SAVED_DATA" type="application/json"></script>
</head>
<body>

<header class="mobile-header">
  <div class="mobile-brand">capital<span>.</span></div>
  <div style="display:flex;gap:6px">
    <button id="exportBtnMobile" style="border:none;background:var(--accent);color:#0b0e11;font-family:var(--mono);font-size:10px;padding:5px 10px;border-radius:5px;cursor:pointer;font-weight:600">💾</button>
    <label style="border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--mono);font-size:10px;padding:5px 9px;border-radius:5px;cursor:pointer">↑<input type="file" id="importFileMobile" accept=".json" style="display:none"></label>
  </div>
</header>
<nav class="bottom-nav" id="bottomNav"></nav>
<div class="toast" id="toast"></div>

<div class="app">
  <button id="sidebarCollapse" class="sidebar-collapse" aria-label="Toggle sidebar">▶</button>
  <aside id="sidebar" class="sidebar">
    <div class="brand">capital<span>.</span></div>
    <nav id="menu"></nav>
    <div class="side-card">
      <div class="k">Capital total</div>
      <div id="capitalTotal" class="v">$0,00</div>
      <div id="capitalNeto" class="sub ok">+$0,00 neto</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">
      <button id="exportBtn" class="btn btn-accent" style="width:100%;font-size:11px;padding:7px">💾 GUARDAR ARCHIVO</button>
      <label id="importLabel" class="btn btn-ghost" style="width:100%;font-size:11px;padding:7px;text-align:center;cursor:pointer">↑ RESTAURAR BACKUP<input type="file" id="importFile" accept=".json" style="display:none"></label>
    </div>
  </aside>
  <main class="main">
    <section id="tab-resumen" class="tab-panel"></section>
    <section id="tab-movimientos" class="tab-panel hide"></section>
    <section id="tab-activos" class="tab-panel hide"></section>
    <section id="tab-inversiones" class="tab-panel hide"></section>
  </main>
</div>

<script>
// ─── CONSTANTS ───
const CATS_GASTO = ["Alimentación","Transporte","Vivienda","Salud","Entretenimiento","Ropa","Educación","Servicios","Deuda","Otros"];
const CATS_INGRESO = ["Salario","Freelance","Inversiones","Alquiler","Rendimiento","Regalo","Bono","Otros"];
const PALETTE = ["#f0b90b","#0ecb81","#4a9eff","#f6465d","#9b6dff","#00c2ff","#ff6b35","#14b8a6","#e879f9"];
const TABS = [
  {id:"resumen",    label:"Resumen",     icon:"▣"},
  {id:"movimientos",label:"Movimientos", icon:"↕"},
  {id:"activos",    label:"Activos",     icon:"◈"},
  {id:"inversiones",label:"Inversiones", icon:"△"},
];
const INIT_WALLETS = [
  {id:1, nombre:"Efectivo",     tipo:"físico",   saldo:0, moneda:"ARS"},
  {id:2, nombre:"Mercado Pago", tipo:"virtual",  saldo:0, moneda:"ARS"},
  {id:3, nombre:"Ualá",         tipo:"virtual",  saldo:0, moneda:"ARS"},
];
const INIT_INVEST = [
  {id:1, nombre:"Plazo Fijo ARS",   tna:75, capital:0, moneda:"ARS", tipo:"plazo_fijo"},
  {id:2, nombre:"FCI Renta Mixta",  tna:40, capital:0, moneda:"ARS", tipo:"fci"},
];

// ─── STATE ───
const state = {
  tab: 'resumen',
  sidebarOpen: true,
  calDate: todayStr(),
  formTipo: 'gasto',
  formWallet: null,
  txns:    load('ct_txns',    []),
  wallets: load('ct_wallets', INIT_WALLETS),
  invest:  load('ct_invest',  INIT_INVEST),
  quotes:  load('ct_quotes',  {usd:null,usdt:null,btc:null,lastFetch:null}),
};

function walletValueARS(w){
  const saldo=Number(w.saldo||0);
  const usd=state.quotes.usd||null;
  const btc=state.quotes.btc||null;
  const usdt=state.quotes.usdt||null;
  if(w.moneda==='ARS') return saldo;
  if(w.moneda==='USD' && usd) return saldo*usd;
  if(w.moneda==='USDT' && usdt && usd) return saldo*usdt*usd;
  if(w.moneda==='BTC' && btc && usd) return saldo*btc*usd;
  return null;
}

function fmtQuote(label, val, suffix=''){
  if(!val) return `<span style="color:var(--text3)">${label}: —</span>`;
  return `<span>${label}: <span style="color:var(--accent)">$${Number(val).toLocaleString('es-AR',{maximumFractionDigits:0})}${suffix}</span></span>`;
}

// ─── PERSISTENCIA — SAFARI COMPATIBLE ───
// Estrategia: los datos viven dentro del propio archivo HTML en <script id="SAVED_DATA">.
// Al guardar: (1) localStorage para sesión inmediata.
//             (2) genera y descarga automáticamente el HTML actualizado con los datos embebidos.
// El usuario reemplaza el archivo descargado con el anterior → datos siempre adentro del HTML.

let _saveTimer = null;
let _pendingDownload = false;

function load(k, fb){
  // Primero leer desde el bloque embebido en este mismo HTML
  try {
    const el = document.getElementById('SAVED_DATA');
    if(el && el.textContent.trim()){
      const all = JSON.parse(el.textContent);
      if(all[k] !== undefined) return all[k];
    }
  } catch(e){}
  // Fallback: localStorage (misma sesión)
  try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch { return fb; }
}

function save(k, v){
  localStorage.setItem(k, JSON.stringify(v));
}

function buildUpdatedHTML(){
  const allData = {
    ct_txns:    state.txns,
    ct_wallets: state.wallets,
    ct_invest:  state.invest,
    ct_quotes:  state.quotes,
  };
  const dataJSON = JSON.stringify(allData);
  const html = document.documentElement.outerHTML;
  // Reemplazar el bloque SAVED_DATA con los datos actuales
  const updated = html.replace(
    /<script id="SAVED_DATA"[^>]*>[\s\S]*?<\/script>/,
    `<script id="SAVED_DATA" type="application/json">${dataJSON}<\/script>`
  );
  return '<!DOCTYPE html>\n' + updated;
}

function autoSaveHTML(){
  // Solo descargar si hay datos reales cargados
  if(!state.txns.length && !state.wallets.length) return;
  downloadHTML();
}

function downloadHTML(){
  const html = buildUpdatedHTML();
  const blob = new Blob([html], {type:'text/html'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'capital.html';
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 capital.html guardado — reemplazá el archivo anterior');
}

function fmt(n){ return `$${Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}`; }
function fmtPct(n){ return `${Number(n||0).toFixed(2)}%`; }
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function esc(s){ return String(s??'').replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function groupByCat(tipo){
  const m={};
  state.txns.filter(t=>t.tipo===tipo).forEach(t=>m[t.categoria]=(m[t.categoria]||0)+Number(t.monto));
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function totals(){
  const totalActivos = state.wallets.reduce((a,w)=>a+Number(w.saldo||0),0);
  const totalIng    = state.txns.filter(t=>t.tipo==='ingreso').reduce((a,t)=>a+Number(t.monto),0);
  const totalGasto  = state.txns.filter(t=>t.tipo==='gasto' ).reduce((a,t)=>a+Number(t.monto),0);
  const totalInvest = state.invest.reduce((a,i)=>a+Number(i.capital||0),0);
  return { totalActivos, totalIng, totalGasto, balance: totalIng-totalGasto, totalInvest };
}
function txnsByDateMap(){
  const m={};
  state.txns.forEach(t=>{
    if(!m[t.fecha]) m[t.fecha]=0;
    m[t.fecha]+= t.tipo==='ingreso'?Number(t.monto):-Number(t.monto);
  });
  return m;
}

// ─── PROJECTED YIELD ───
// Compuesto mensual: ciclo iterativo explícito mes a mes
// Simple: capital × (TNA/100) × (meses/12)
function proyectar(capital, tna_pct, meses, compuesto){
  const cap = Number(capital) || 0;
  const tna = Number(tna_pct) || 0;
  const m   = Number(meses)   || 0;
  if(cap <= 0 || tna <= 0 || m <= 0) return cap;

  if(compuesto === true){
    // Ciclo explícito: cada mes suma los intereses al saldo
    let saldo = cap;
    const tasaMensual = tna / 100 / 12;
    for(let i = 0; i < m; i++){
      saldo = saldo + saldo * tasaMensual;
    }
    return saldo;
  } else {
    // Interés simple: lineal
    return cap + cap * (tna / 100) * (m / 12);
  }
}

function groupByCat(tipo){
  const m={};
  state.txns.filter(t=>t.tipo===tipo).forEach(t=>m[t.categoria]=(m[t.categoria]||0)+Number(t.monto));
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function totals(){
  const totalActivos = state.wallets.reduce((a,w)=>a+Number(w.saldo||0),0);
  const totalIng    = state.txns.filter(t=>t.tipo==='ingreso').reduce((a,t)=>a+Number(t.monto),0);
  const totalGasto  = state.txns.filter(t=>t.tipo==='gasto' ).reduce((a,t)=>a+Number(t.monto),0);
  const totalInvest = state.invest.reduce((a,i)=>a+Number(i.capital||0),0);
  return { totalActivos, totalIng, totalGasto, balance: totalIng-totalGasto, totalInvest };
}
function txnsByDateMap(){
  const m={};
  state.txns.forEach(t=>{
    if(!m[t.fecha]) m[t.fecha]=0;
    m[t.fecha]+= t.tipo==='ingreso'?Number(t.monto):-Number(t.monto);
  });
  return m;
}

// ─── PIE CARD ───
function pieCard(title, data, colors){
  if(!data.length) return '';  // No mostrar nada si no hay datos
  const total = data.reduce((a,[,v])=>a+v,0);
  const cx=56,cy=56,r=46;
  let slices;
  if(data.length===1){
    // Un solo elemento: círculo completo
    slices=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${colors[0]}"></circle>`;
  } else {
    let cum=-90;
    slices = data.map(([cat,val],i)=>{
      const pct=val/total, angle=pct*360;
      // Cap angle slightly below 360 to avoid degenerate arc
      const safeAngle=Math.min(angle,359.99);
      const s=(cum*Math.PI)/180; cum+=angle; const e=(cum*Math.PI)/180;
      const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
      return `<path d="M${cx},${cy} L${x1},${y1} A${r},${r},0,${safeAngle>180?1:0},1,${x2},${y2} Z" fill="${colors[i%colors.length]}"></path>`;
    }).join('');
  }
  const legend = data.slice(0,6).map(([cat,val],i)=>`
    <div class="legend-row">
      <div class="legend-left"><span class="sw" style="background:${colors[i%colors.length]}"></span><span class="truncate">${esc(cat)}</span></div>
      <span class="legend-pct">${Math.round(val/total*100)}%</span>
    </div>`).join('');
  return `
    <div class="card">
      <div class="section-title">${title}</div>
      <div class="pie-wrap">
        <svg width="112" height="112" viewBox="0 0 112 112">${slices}<circle cx="${cx}" cy="${cy}" r="20" fill="#161a1f"></circle></svg>
        <div class="legend">${legend}</div>
      </div>
    </div>`;
}

  const btcUsdt = (btc && usdt && usdt > 0) ? btc / usdt : null;

  function walletUSD(w){
    const s=Number(w.saldo||0);
    if(w.moneda==='ARS') return usd ? s/usd : null;
    if(w.moneda==='USD') return s;
    if(w.moneda==='USDT') return usdt ? s*usdt : s; // USDT ≈ USD

      else state.quotes.usdt = ut;                           // ya en USD

      else if(btcInARS && state.quotes.usd) state.quotes.btc = b/state.quotes.usd;

    const moneda=document.getElementById('walletMoneda').value;
    const color=document.getElementById('walletColor').value||'#f0b90b';

    if(!nombre) return;
    state.wallets.push({id:Date.now(),nombre,tipo,saldo,moneda,color,rendAnual:rendAnual||null});

    render();

    modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px';

        <div style="font-family:var(--mono);font-size:13px;font-weight:500;margin-bottom:16px;color:var(--text)">EDITAR — ${esc(w.nombre)}</div>
        <div class="form-stack">
          <div><label class="label">Saldo actual</label><input id="editSaldo" class="field" type="number" value="${w.saldo}" step="0.01"></div>
          <div>
            <label class="label">Color</label>
            <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
              <input id="editColor" type="color" value="${w.color||'#f0b90b'}" style="width:36px;height:32px;border:1px solid var(--border);border-radius:4px;background:transparent;cursor:pointer;padding:2px">
            </div>
          </div>
          <div><label class="label">Rendimiento anual % TNA</label><input id="editRend" class="field" type="number" value="${w.rendAnual||''}" placeholder="0 = sin rendimiento" step="0.01"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:16px">
          <button id="editSave" class="btn btn-accent" style="flex:1">GUARDAR</button>
          <button id="editCancel" class="btn btn-ghost">CANCELAR</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    modal.querySelector('#editCancel').onclick=()=>modal.remove();
    modal.querySelector('#editSave').onclick=()=>{
      w.saldo=Number(modal.querySelector('#editSaldo').value||w.saldo);
      w.color=modal.querySelector('#editColor').value;
      const rend=Number(modal.querySelector('#editRend').value);
      w.rendAnual=rend>0?rend:null;
      save('ct_wallets',state.wallets);
      modal.remove();
      render();
      showToast(`${w.nombre} actualizado`);
    };
    modal.onclick=e=>{if(e.target===modal) modal.remove();};
  });
  root.querySelectorAll('[data-del-wallet]').forEach(btn=>btn.onclick=()=>{
    state.wallets=state.wallets.filter(w=>String(w.id)!==btn.dataset.delWallet);
    save('ct_wallets',state.wallets);
    render();
  });
}

              const cap=Number(inv.capital||0);
              const tna=Number(inv.tna||0);
              const cmp = inv.compuesto === true; // solo true si se guardó explícitamente como true
              const r3  = proyectar(cap, tna, 3,  cmp) - cap;
              const r6  = proyectar(cap, tna, 6,  cmp) - cap;
              const r12 = proyectar(cap, tna, 12, cmp) - cap;
              const r12s = proyectar(cap, tna, 12, false) - cap; // siempre simple para comparar
              const tipos={'plazo_fijo':'PF','fci':'FCI','accion':'ACC','cripto':'CRIPTO','cedear':'CEDEAR','otro':'OTRO'};
              return `
                <div class="invest-card">
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
                    <div style="display:flex;align-items:center;gap:8px">
                      <div style="width:8px;height:8px;border-radius:2px;background:${color}"></div>
                      <div>
                        <div class="invest-name">${esc(inv.nombre)}</div>
                        <div style="display:flex;gap:4px;margin-top:3px;flex-wrap:wrap">
                          <span class="badge badge-gray">${tipos[inv.tipo]||inv.tipo.toUpperCase()}</span>
                          <span class="badge badge-gray">${esc(inv.moneda)}</span>
                          <span class="badge ${cmp?'badge-yellow':'badge-blue'}">${cmp?'COMPUESTO':'SIMPLE'}</span>
                        </div>
                      </div>
                    </div>
                    <div style="text-align:right">
                      <div class="invest-rate">${fmtPct(inv.tna)} TNA</div>
                      <div class="invest-meta">${fmt(cap)} capital</div>
                    </div>
                  </div>
                  <div style="background:var(--bg);border-radius:6px;padding:10px;border:1px solid var(--border)">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                      <div class="invest-meta">RENDIMIENTO PROYECTADO</div>
                      <div class="invest-meta" style="color:${cmp?'var(--accent)':'var(--blue)'}">INT. ${cmp?'COMPUESTO':'SIMPLE'}</div>
                    </div>
                    <div class="projected-row"><span style="color:var(--text2)">3 meses</span><div style="text-align:right"><div class="amount-positive">+${fmt(r3)}</div><div style="font-family:var(--mono);font-size:10px;color:var(--text3)">total ${fmt(cap+r3)}</div></div></div>
                    <div class="projected-row"><span style="color:var(--text2)">6 meses</span><div style="text-align:right"><div class="amount-positive">+${fmt(r6)}</div><div style="font-family:var(--mono);font-size:10px;color:var(--text3)">total ${fmt(cap+r6)}</div></div></div>
                    <div class="projected-row">
                      <span style="color:var(--text2)">12 meses</span>
                      <div style="text-align:right">
                        <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">
                          <span class="amount-positive">+${fmt(r12)}</span>
                          <span style="font-family:var(--mono);font-size:10px;color:var(--accent)">${fmtPct((r12/Math.max(cap,1))*100)}</span>
                        </div>
                        <div style="font-family:var(--mono);font-size:10px;color:var(--text3)">total ${fmt(cap+r12)}</div>
                      </div>
                    </div>
                    ${cap > 0 ? `
                    <div class="projected-row" style="border-top:1px dashed var(--border);margin-top:4px;padding-top:8px">
                      <span style="color:var(--text3);font-size:10px">vs. interés simple 12m</span>
                      <span style="font-family:var(--mono);font-size:11px;color:var(--text2)">+${fmt(r12s)} <span style="color:${r12>r12s?'var(--green)':'var(--text3)'};font-size:10px">(${r12>r12s?'+':'-'}${fmt(Math.abs(r12-r12s))} ${r12>r12s?'extra':'menos'})</span></span>
                    </div>` : ''}
                  </div>
                  <div style="margin-top:10px;display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap">
                    <div style="display:flex;align-items:center;gap:6px">
                      <label class="label" style="display:inline;margin:0">Ajustar capital:</label>
                      <input class="field" style="width:110px" type="number" placeholder="Nuevo capital" data-inv-cap="${inv.id}">
                    </div>
                    <button class="btn-danger" data-del-inv="${inv.id}">ELIMINAR</button>
                  </div>
                </div>`
            }).join('') : `<div class="empty">SIN INVERSIONES REGISTRADAS</div>`}
          </div>
        </div>

        <!-- Simulador rápido -->
        <div class="card">
          <div class="section-title">SIMULADOR</div>
          <div class="form-stack">
            <div><label class="label">Capital a simular</label><input id="simCap" class="field" type="number" placeholder="100000"></div>
            <div><label class="label">TNA %</label><input id="simTna" class="field" type="number" placeholder="75"></div>
            <div>
              <label class="label">Tipo de interés</label>
              <div class="seg" style="margin-bottom:0">
                <button id="sim-compuesto" class="seg-btn active">COMPUESTO</button>
                <button id="sim-simple" class="seg-btn">SIMPLE</button>
              </div>
            </div>
            <button id="simBtn" class="btn btn-ghost" style="width:100%">CALCULAR</button>
          </div>
          <div id="simResult" style="margin-top:12px"></div>
        </div>
      </div>
    </div>
  `;

  // Toggle interés compuesto / simple
  let invCompuesto = true;
  document.getElementById('inv-compuesto').onclick=()=>{ invCompuesto=true; document.getElementById('inv-compuesto').classList.add('active'); document.getElementById('inv-simple').classList.remove('active'); };
  document.getElementById('inv-simple').onclick=()=>{ invCompuesto=false; document.getElementById('inv-simple').classList.add('active'); document.getElementById('inv-compuesto').classList.remove('active'); };

  document.getElementById('addInvest').onclick=()=>{
    const nombre=document.getElementById('invNombre').value.trim();
    const tipo=document.getElementById('invTipo').value;
    const tna=Number(document.getElementById('invTna').value);
    const capital=Number(document.getElementById('invCapital').value||0);
    const moneda=document.getElementById('invMoneda').value;
    if(!nombre||!tna) return;
    state.invest.push({id:Date.now(),nombre,tipo,tna,capital,moneda,compuesto:invCompuesto});
    save('ct_invest',state.invest);
    render();
  };

  root.querySelectorAll('[data-del-inv]').forEach(btn=>btn.onclick=()=>{
    state.invest=state.invest.filter(i=>String(i.id)!==btn.dataset.delInv);
    save('ct_invest',state.invest);
    render();
  });

  root.querySelectorAll('[data-inv-cap]').forEach(input=>input.onchange=()=>{
    const id=Number(input.dataset.invCap);
    const val=Number(input.value);
    if(isNaN(val)||val<0) return;
    const inv=state.invest.find(i=>i.id===id);
    if(inv){inv.capital=val;save('ct_invest',state.invest);renderInversiones();}
  });

  let simCompuesto = true;
  document.getElementById('sim-compuesto').onclick=()=>{ simCompuesto=true; document.getElementById('sim-compuesto').classList.add('active'); document.getElementById('sim-simple').classList.remove('active'); };
  document.getElementById('sim-simple').onclick=()=>{ simCompuesto=false; document.getElementById('sim-simple').classList.add('active'); document.getElementById('sim-compuesto').classList.remove('active'); };

  document.getElementById('simBtn').onclick=()=>{
    const cap=Number(document.getElementById('simCap').value);
    const tna=Number(document.getElementById('simTna').value);
    if(!cap||!tna){document.getElementById('simResult').innerHTML='';return;}
    const r3=proyectar(cap,tna,3,simCompuesto)-cap;
    const r6=proyectar(cap,tna,6,simCompuesto)-cap;
    const r12=proyectar(cap,tna,12,simCompuesto)-cap;
    const r24=proyectar(cap,tna,24,simCompuesto)-cap;
    const r12alt=proyectar(cap,tna,12,!simCompuesto)-cap;
    const fmtRow=(meses,gan)=>`
      <div class="projected-row">
        <span style="color:var(--text2)">${meses} meses</span>
        <div style="text-align:right">
          <div class="amount-positive">+${fmt(gan)}</div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--text3)">total ${fmt(cap+gan)}</div>
        </div>
      </div>`;
    document.getElementById('simResult').innerHTML=`
      <div style="background:var(--bg);border-radius:6px;border:1px solid var(--border);padding:10px">
        <div class="invest-meta" style="margin-bottom:8px">CAPITAL: ${fmt(cap)} · ${fmtPct(tna)} TNA · INT. ${simCompuesto?'COMPUESTO MENSUAL':'SIMPLE'}</div>
        ${fmtRow(3,r3)}${fmtRow(6,r6)}${fmtRow(12,r12)}${fmtRow(24,r24)}
        <div class="projected-row" style="border-top:1px dashed var(--border);margin-top:4px;padding-top:8px">
          <span style="color:var(--text3);font-size:10px">vs. ${simCompuesto?'simple':'compuesto'} a 12m</span>
          <span style="font-family:var(--mono);font-size:11px;color:var(--text2)">+${fmt(r12alt)} <span style="color:${simCompuesto?'var(--green)':'var(--red)'};font-size:10px">(${simCompuesto?'+':'−'}${fmt(Math.abs(r12-r12alt))})</span></span>
        </div>
      </div>
    `;
  };
}

// ─── APPLY DAILY YIELDS ───
function applyDailyYields(){
  const today = todayStr();
  let changed = false;
  state.wallets.forEach(w => {
    if(!w.rendAnual || Number(w.rendAnual) <= 0) return;
    if(w.lastYieldDate === today) return; // already done today
    // Count days since last applied
    const from = w.lastYieldDate ? new Date(w.lastYieldDate) : null;
    const toDate = new Date(today);
    if(!from || from >= toDate) { w.lastYieldDate = today; changed = true; return; }
    // Calculate days elapsed
    const msPerDay = 86400000;
    const days = Math.floor((toDate - from) / msPerDay);
    if(days <= 0) return;
    const dailyRate = Number(w.rendAnual) / 100 / 365;
    for(let d=0; d<days; d++){
      const dayDate = new Date(from.getTime() + (d+1)*msPerDay);
      const dateStr = dayDate.toISOString().split('T')[0];
      const rendMonto = Number(w.saldo||0) * dailyRate;
      if(rendMonto <= 0) continue;
      const txn = {
        id: Date.now() + d,
        tipo: 'ingreso',
        categoria: 'Rendimiento',
        monto: rendMonto,
        descripcion: `Rend. diario ${esc(w.nombre)} (${fmtPct(w.rendAnual)} TNA)`,
        fecha: dateStr,
        walletId: w.id,
        esRendimiento: true,
        walletNombre: w.nombre
      };
      state.txns.unshift(txn);
      w.saldo = Number(w.saldo||0) + rendMonto;
    }
    w.lastYieldDate = today;
    changed = true;
  });
  if(changed){
    save('ct_txns', state.txns);
    save('ct_wallets', state.wallets);
  }
}

// ─── MAIN RENDER ───
function render(){
  renderSidebarShell();
  renderMenu();
  updateSidebar();
  document.querySelectorAll('.tab-panel').forEach(el=>el.classList.add('hide'));
  document.getElementById('tab-'+state.tab).classList.remove('hide');
  renderResumen();
  renderMovimientos();
  renderActivos();
  renderInversiones();
}

document.getElementById('sidebarCollapse').onclick=()=>{state.sidebarOpen=!state.sidebarOpen;renderSidebarShell()};

// ─── EXPORT / IMPORT ───
document.getElementById('exportBtn').onclick = ()=>downloadHTML();

document.getElementById('importFile').onchange=(e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try {
      const data = JSON.parse(ev.target.result);
      if(data.ct_txns)    { state.txns    = data.ct_txns;    localStorage.setItem('ct_txns',    JSON.stringify(state.txns)); }
      if(data.ct_wallets) { state.wallets = data.ct_wallets; localStorage.setItem('ct_wallets', JSON.stringify(state.wallets)); }
      if(data.ct_invest)  { state.invest  = data.ct_invest;  localStorage.setItem('ct_invest',  JSON.stringify(state.invest)); }
      if(data.ct_quotes)  { state.quotes  = data.ct_quotes;  localStorage.setItem('ct_quotes',  JSON.stringify(state.quotes)); }
      render();
      showToast('✓ Datos restaurados');
    } catch(err) {
      alert('Archivo inválido.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
};

const exportBtnMobile = document.getElementById('exportBtnMobile');
if(exportBtnMobile) exportBtnMobile.onclick = ()=>downloadHTML();
const importFileMobile = document.getElementById('importFileMobile');
if(importFileMobile) importFileMobile.onchange = (e)=>{
  document.getElementById('importFile').files = e.target.files;
  document.getElementById('importFile').dispatchEvent(new Event('change'));
};
applyDailyYields();
render();
</script>
